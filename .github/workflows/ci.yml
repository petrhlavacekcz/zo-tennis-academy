name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Use npm 10.9.4
        run: |
          corepack enable
          corepack prepare npm@10.9.4 --activate

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
